<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SG & Japon 2026">
<meta name="theme-color" content="#1A1A1A">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%231A1A1A'/><text x='90' y='125' font-size='90' text-anchor='middle'>✈</text></svg>">
<title>Singapour & Japon 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --gold: #C9A84C;
    --gold-light: #F2E6C2;
    --gold-pale: #FAF6EE;
    --dark: #1A1A1A;
    --dark2: #2C2C2C;
    --grey: #666;
    --grey-light: #AAA;
    --grey-pale: #F4F4F2;
    --cream: #FEFDF8;
    --teal: #2A6B7C;
    --teal-pale: #EAF4F7;
    --coral: #C8573F;
    --coral-pale: #FDF0EE;
    --green: #2E6B3E;
    --green-pale: #EEF5F0;
    --purple: #5B3A7E;
    --purple-pale: #F2EEF8;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; background: var(--dark); color: var(--dark);
    font-family: 'DM Sans', sans-serif; overflow: hidden;
  }

  /* ── APP SHELL ── */
  #app { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── COVER ── */
  #cover {
    position: absolute; inset: 0; z-index: 100;
    background: var(--dark);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 0; padding: 32px 24px;
    transition: opacity .6s ease, transform .6s ease;
  }
  #cover.hidden { opacity: 0; transform: translateY(-20px); pointer-events: none; }

  .cover-tag {
    font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 600;
    letter-spacing: 4px; color: var(--gold); text-transform: uppercase;
    margin-bottom: 24px;
  }
  .cover-title {
    font-family: 'Cormorant Garamond', serif; font-size: clamp(52px, 16vw, 72px);
    font-weight: 700; color: #fff; line-height: .9; text-align: center;
    text-shadow: 0 2px 40px rgba(201,168,76,.15);
  }
  .cover-amp {
    font-family: 'Cormorant Garamond', serif; font-size: 22px;
    color: var(--gold); margin: 10px 0;
  }
  .cover-line {
    width: 80px; height: 1.5px; background: var(--gold); margin: 18px auto;
  }
  .cover-date {
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    color: var(--gold-light); letter-spacing: 2px;
  }
  .cover-stats {
    display: flex; gap: 20px; margin-top: 28px;
  }
  .cover-stat {
    background: #272727; border-radius: 10px; padding: 14px 18px;
    text-align: center; min-width: 60px;
  }
  .cover-stat-n {
    font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700;
    color: var(--gold); line-height: 1;
  }
  .cover-stat-l {
    font-size: 9px; font-weight: 500; color: var(--grey-light);
    text-transform: uppercase; letter-spacing: 1px; margin-top: 4px;
  }
  .cover-route {
    display: flex; align-items: center; gap: 6px; margin-top: 24px; flex-wrap: wrap;
    justify-content: center;
  }
  .cover-route span {
    font-size: 9px; font-weight: 600; letter-spacing: 1.5px;
    color: var(--grey-light); text-transform: uppercase;
  }
  .cover-route .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
  .cover-route .first, .cover-route .last { color: var(--gold); }
  .cover-btn {
    margin-top: 36px; background: var(--gold); color: var(--dark);
    border: none; border-radius: 50px; padding: 16px 40px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    letter-spacing: 1px; cursor: pointer;
    box-shadow: 0 8px 30px rgba(201,168,76,.35);
    transition: transform .15s, box-shadow .15s;
  }
  .cover-btn:active { transform: scale(.96); box-shadow: 0 4px 15px rgba(201,168,76,.2); }

  /* ── TOP BAR ── */
  #topbar {
    background: var(--dark); padding: calc(var(--safe-top) + 12px) 16px 12px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1.5px solid var(--gold);
    flex-shrink: 0;
  }
  #topbar.hidden { display: none; }
  .tb-back {
    background: #2a2a2a; border: none; border-radius: 8px;
    padding: 8px 12px; color: var(--gold);
    font-size: 13px; font-weight: 600; cursor: pointer;
    display: none; white-space: nowrap;
  }
  .tb-back.show { display: block; }
  .tb-title {
    flex: 1; font-family: 'Cormorant Garamond', serif;
    font-size: 17px; font-weight: 600; color: #fff;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tb-sub { font-size: 10px; color: var(--gold); letter-spacing: 1px; font-weight: 500; }

  /* ── BOTTOM NAV ── */
  #bottomnav {
    background: var(--dark); border-top: 1px solid #333;
    display: flex; padding-bottom: var(--safe-bot);
    flex-shrink: 0;
  }
  #bottomnav.hidden { display: none; }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 10px 4px; gap: 4px; cursor: pointer; border: none; background: none;
    transition: all .2s;
  }
  .nav-item.active .nav-icon { color: var(--gold); }
  .nav-item.active .nav-label { color: var(--gold); }
  .nav-icon { font-size: 18px; color: #555; transition: color .2s; }
  .nav-label { font-size: 9px; font-weight: 600; letter-spacing: .5px; color: #555;
    text-transform: uppercase; transition: color .2s; }

  /* ── MAIN CONTENT ── */
  #main { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }

  /* ── SCREENS ── */
  .screen { display: none; min-height: 100%; }
  .screen.active { display: block; }

  /* ── ITINERARY LIST ── */
  .days-list { padding: 16px; display: flex; flex-direction: column; gap: 10px; }

  .chapter-header {
    background: var(--dark); border-radius: 14px; overflow: hidden;
    margin-bottom: 4px;
  }
  .chapter-header-inner {
    padding: 18px 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .chapter-num {
    width: 42px; height: 42px; border-radius: 10px;
    background: var(--gold); display: flex; flex-direction: column;
    align-items: center; justify-content: center; flex-shrink: 0;
  }
  .chapter-num-n {
    font-family: 'Cormorant Garamond', serif; font-size: 20px;
    font-weight: 700; color: var(--dark); line-height: 1;
  }
  .chapter-city {
    font-family: 'Cormorant Garamond', serif; font-size: 22px;
    font-weight: 700; color: #fff;
  }
  .chapter-dates { font-size: 11px; color: var(--gold); font-weight: 500; margin-top: 2px; }
  .chapter-desc { font-size: 11px; color: #888; line-height: 1.5; margin-top: 3px; }

  .day-card {
    background: var(--cream); border-radius: 14px; overflow: hidden;
    cursor: pointer; transition: transform .15s, box-shadow .15s;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .day-card:active { transform: scale(.98); }
  .day-card-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; border-bottom: 1px solid rgba(201,168,76,.15);
  }
  .day-num-badge {
    width: 40px; height: 40px; border-radius: 50%; background: var(--gold);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .day-num-j { font-size: 7px; font-weight: 700; color: var(--dark); letter-spacing: 1px; }
  .day-num-n {
    font-family: 'Cormorant Garamond', serif; font-size: 18px;
    font-weight: 700; color: var(--dark); line-height: 1;
  }
  .day-card-info { flex: 1; min-width: 0; }
  .day-card-date { font-size: 13px; font-weight: 600; color: var(--dark); }
  .day-card-loc { font-size: 11px; color: var(--teal); font-weight: 500; margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .day-card-hotel {
    font-size: 10px; background: var(--gold); color: var(--dark);
    padding: 4px 9px; border-radius: 20px; font-weight: 600; white-space: nowrap;
    align-self: flex-start; flex-shrink: 0;
  }
  .day-card-preview {
    padding: 10px 16px 14px;
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .preview-pill {
    font-size: 10px; padding: 4px 10px; border-radius: 20px;
    font-weight: 500;
  }
  .pill-transport { background: var(--teal-pale); color: var(--teal); }
  .pill-activity  { background: var(--gold-pale); color: #8a6a1a; }
  .pill-meal      { background: var(--coral-pale); color: var(--coral); }
  .pill-show      { background: var(--purple-pale); color: var(--purple); }
  .pill-hotel     { background: var(--green-pale); color: var(--green); }
  .day-card-chevron { color: var(--grey-light); font-size: 16px; }
  .day-preview-more { font-size: 10px; color: var(--grey-light); padding: 4px 10px; }

  /* ── DAY DETAIL ── */
  #day-detail { background: var(--cream); }
  .detail-header {
    background: var(--dark); padding: 20px 16px 16px;
  }
  .detail-day-row { display: flex; align-items: center; gap: 14px; }
  .detail-badge {
    width: 52px; height: 52px; border-radius: 50%; background: var(--gold);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .detail-badge-j { font-size: 8px; font-weight: 700; color: var(--dark); letter-spacing: 1px; }
  .detail-badge-n { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 700; color: var(--dark); }
  .detail-date-block { flex: 1; }
  .detail-date { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700; color: #fff; }
  .detail-loc { font-size: 11px; color: var(--gold); font-weight: 600; letter-spacing: 1px; margin-top: 3px; }
  .detail-hotel-pill {
    background: var(--gold); color: var(--dark); padding: 6px 12px;
    border-radius: 20px; font-size: 10px; font-weight: 700; text-align: center;
    max-width: 130px; line-height: 1.3;
  }

  /* ── TIMELINE ── */
  .timeline { padding: 16px; display: flex; flex-direction: column; gap: 0; }
  .tl-item { display: flex; gap: 12px; }
  .tl-left { display: flex; flex-direction: column; align-items: center; width: 36px; flex-shrink: 0; }
  .tl-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; margin-top: 14px; }
  .tl-line { width: 2px; flex: 1; min-height: 12px; }
  .tl-card {
    flex: 1; border-radius: 12px; padding: 13px 14px 12px;
    margin-bottom: 10px; position: relative;
  }
  .tl-time { font-size: 10px; font-weight: 700; letter-spacing: .5px; margin-bottom: 4px; }
  .tl-title { font-size: 14px; font-weight: 600; color: var(--dark); line-height: 1.3; margin-bottom: 5px; }
  .tl-body { font-size: 12px; color: var(--grey); line-height: 1.5; }
  .tl-cost {
    position: absolute; top: 12px; right: 12px;
    font-size: 10px; font-weight: 700; padding: 3px 9px;
    border-radius: 20px; max-width: 100px; text-align: center;
    white-space: nowrap;
  }

  /* Type colors */
  .type-transport .tl-card { background: var(--teal-pale); }
  .type-transport .tl-dot  { background: var(--teal); }
  .type-transport .tl-line { background: rgba(42,107,124,.2); }
  .type-transport .tl-time { color: var(--teal); }
  .type-transport .tl-cost { background: var(--teal); color: #fff; }

  .type-activity .tl-card { background: var(--gold-pale); }
  .type-activity .tl-dot  { background: var(--gold); }
  .type-activity .tl-line { background: rgba(201,168,76,.2); }
  .type-activity .tl-time { color: #8a6a1a; }
  .type-activity .tl-cost { background: var(--gold); color: var(--dark); }

  .type-meal .tl-card { background: var(--coral-pale); }
  .type-meal .tl-dot  { background: var(--coral); }
  .type-meal .tl-line { background: rgba(200,87,63,.2); }
  .type-meal .tl-time { color: var(--coral); }
  .type-meal .tl-cost { background: var(--coral); color: #fff; }

  .type-hotel .tl-card { background: var(--green-pale); }
  .type-hotel .tl-dot  { background: var(--green); }
  .type-hotel .tl-line { background: rgba(46,107,62,.2); }
  .type-hotel .tl-time { color: var(--green); }
  .type-hotel .tl-cost { background: var(--green); color: #fff; }

  .type-show .tl-card { background: var(--purple-pale); }
  .type-show .tl-dot  { background: var(--purple); }
  .type-show .tl-line { background: rgba(91,58,126,.2); }
  .type-show .tl-time { color: var(--purple); }
  .type-show .tl-cost { background: var(--purple); color: #fff; }

  .type-normal .tl-card { background: var(--grey-pale); }
  .type-normal .tl-dot  { background: var(--grey-light); }
  .type-normal .tl-line { background: rgba(170,170,170,.2); }
  .type-normal .tl-time { color: var(--grey); }
  .type-normal .tl-cost { background: var(--grey-light); color: #fff; }

  .tip-box {
    background: var(--gold-pale); border-left: 3px solid var(--gold);
    border-radius: 10px; padding: 12px 14px; margin: 4px 0 12px;
  }
  .tip-label { font-size: 10px; font-weight: 700; color: var(--gold); letter-spacing: 1px; margin-bottom: 4px; }
  .tip-text  { font-size: 12px; color: var(--dark2); line-height: 1.5; }

  .note-bar {
    background: var(--dark); border-radius: 10px; padding: 12px 14px; margin: 0 0 20px;
  }
  .note-label { font-size: 10px; font-weight: 700; color: var(--gold); letter-spacing: 1px; margin-bottom: 3px; }
  .note-text  { font-size: 12px; color: #ccc; line-height: 1.4; }

  /* ── PROGRESS BAR ── */
  .progress-bar-wrap {
    background: #2a2a2a; height: 3px; margin: 0;
  }
  .progress-bar-fill {
    height: 100%; background: var(--gold);
    transition: width .4s ease;
  }

  /* ── INFO SCREEN ── */
  .info-section { padding: 16px; }
  .info-card {
    background: var(--cream); border-radius: 14px; overflow: hidden;
    margin-bottom: 12px;
  }
  .info-card-head {
    background: var(--dark); padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .info-card-icon {
    width: 32px; height: 32px; border-radius: 8px; background: var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0;
  }
  .info-card-title { font-size: 14px; font-weight: 700; color: #fff; }
  .info-card-body { padding: 12px 16px; }
  .info-row {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 9px 0; border-bottom: 1px solid rgba(201,168,76,.12);
    gap: 10px;
  }
  .info-row:last-child { border-bottom: none; }
  .info-row-label { font-size: 12px; font-weight: 600; color: var(--dark); flex-shrink: 0; max-width: 48%; }
  .info-row-val { font-size: 12px; color: var(--grey); text-align: right; line-height: 1.4; }
  .resa-card {
    background: var(--cream); border-radius: 14px; overflow: hidden;
    margin-bottom: 10px; border: 1px solid rgba(201,168,76,.2);
  }
  .resa-header { padding: 12px 14px 8px; display: flex; gap: 10px; align-items: flex-start; }
  .resa-date-pill {
    padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700;
    white-space: nowrap; flex-shrink: 0;
  }
  .resa-name { font-size: 14px; font-weight: 700; color: var(--dark); line-height: 1.3; }
  .resa-detail { font-size: 11px; color: var(--grey); margin-top: 2px; line-height: 1.4; }
  .resa-footer {
    padding: 8px 14px 10px; font-size: 11px; font-weight: 700;
    letter-spacing: .5px; text-transform: uppercase;
  }

  /* ── TIPS/PHRASES SCREEN ── */
  .tips-section { padding: 16px; }
  .meteo-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
  .meteo-card {
    background: var(--cream); border-radius: 14px; padding: 14px 10px;
    text-align: center;
  }
  .meteo-circle {
    width: 54px; height: 54px; border-radius: 50%; margin: 0 auto 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .meteo-temp { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 700; color: #fff; }
  .meteo-city { font-size: 11px; font-weight: 700; color: var(--dark); margin-bottom: 3px; }
  .meteo-hum  { font-size: 10px; color: var(--grey); line-height: 1.3; }

  .phrases-grid { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
  .phrase-row {
    background: var(--cream); border-radius: 10px; padding: 11px 14px;
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
  }
  .phrase-jp { font-size: 13px; font-weight: 600; color: var(--dark); }
  .phrase-fr { font-size: 12px; color: var(--grey); font-style: italic; text-align: right; }

  .essentials-grid { display: flex; flex-direction: column; gap: 6px; }
  .essential-row {
    background: var(--cream); border-radius: 10px; padding: 12px 14px;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .essential-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex-shrink: 0; margin-top: 4px; }
  .essential-label { font-size: 13px; font-weight: 600; color: var(--dark); margin-bottom: 2px; }
  .essential-val { font-size: 11px; color: var(--grey); line-height: 1.4; }

  /* ── SECTION TITLES ── */
  .screen-section-title {
    font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; color: var(--gold);
    padding: 18px 16px 8px; display: flex; align-items: center; gap: 8px;
  }
  .screen-section-title::after {
    content: ''; flex: 1; height: 1px; background: rgba(201,168,76,.2);
  }

  /* ── VOLS SECTION ── */
  .vol-card {
    background: var(--cream); border-radius: 14px; overflow: hidden;
    margin-bottom: 10px; border-left: 4px solid var(--gold);
  }
  .vol-inner { padding: 13px 14px; }
  .vol-type { font-size: 10px; font-weight: 700; color: var(--gold); letter-spacing: 1px; margin-bottom: 4px; }
  .vol-route { font-size: 15px; font-weight: 700; color: var(--dark); margin-bottom: 3px; }
  .vol-detail { font-size: 11px; color: var(--grey); }
  .vol-status { font-size: 10px; font-weight: 700; color: var(--green); margin-top: 4px; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 0; }

  /* ── LOADING FALLBACK ── */
  .no-google-font body { font-family: -apple-system, 'Helvetica Neue', sans-serif; }

  /* ── ANIMATE ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp .35s ease forwards; }
  .fade-up-d1 { animation-delay: .05s; opacity: 0; }
  .fade-up-d2 { animation-delay: .1s;  opacity: 0; }
  .fade-up-d3 { animation-delay: .15s; opacity: 0; }

  /* ── TODAY HIGHLIGHT ── */
  .today-indicator {
    background: var(--gold); color: var(--dark); font-size: 9px; font-weight: 700;
    padding: 2px 8px; border-radius: 20px; letter-spacing: 1px;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center; padding: 60px 24px; color: var(--grey);
  }
  .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state-text { font-size: 15px; }
</style>
</head>
<body>

<div id="cover">
  <div class="cover-tag">Carnet de Voyage Premium</div>
  <div class="cover-title">SINGAPOUR</div>
  <div class="cover-amp">&</div>
  <div class="cover-title">JAPON</div>
  <div class="cover-line"></div>
  <div class="cover-date">13 — 30 AOÛT 2026</div>
  <div class="cover-stats">
    <div class="cover-stat"><div class="cover-stat-n">17</div><div class="cover-stat-l">Jours</div></div>
    <div class="cover-stat"><div class="cover-stat-n">4</div><div class="cover-stat-l">Voyageurs</div></div>
    <div class="cover-stat"><div class="cover-stat-n">6</div><div class="cover-stat-l">Villes</div></div>
    <div class="cover-stat"><div class="cover-stat-n">5</div><div class="cover-stat-l">Hôtels</div></div>
  </div>
  <div class="cover-route">
    <span class="first">Paris</span><div class="dot"></div>
    <span>Singapour</span><div class="dot"></div>
    <span>Osaka</span><div class="dot"></div>
    <span>Kyoto</span><div class="dot"></div>

// APP STATE
// ════════════════════════════════════════════════════════
let currentScreen = 'itinerary';
let currentDay = null;
let history = [];

// ════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════
function getTodayDayId() {
  const now = new Date();
  const tripStart = new Date(2026, 7, 13); // Aug 13
  const diff = Math.floor((now - tripStart) / 86400000);
  if (diff >= 0 && diff < 17) return diff + 1;
  return null;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ════════════════════════════════════════════════════════
// COVER → APP
// ════════════════════════════════════════════════════════
function startApp() {
  document.getElementById('cover').classList.add('hidden');
  document.getElementById('app').style.display = 'flex';
  renderDaysList();
  renderInfo();
  renderTips();
  setTimeout(() => updateProgress(), 100);
}

// ════════════════════════════════════════════════════════
// SCREENS
// ════════════════════════════════════════════════════════
function showScreen(name, pushHistory=true) {
  if (name !== 'day' && pushHistory && currentScreen !== name) {
    history = [];
  }
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  currentScreen = name;

  // Nav
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (['itinerary','info','tips'].includes(name)) {
    document.getElementById('nav-'+name)?.classList.add('active');
  }

  // Top bar
  const backBtn = document.getElementById('backBtn');
  if (name === 'day') {
    backBtn.classList.add('show');
    document.getElementById('topTitle').textContent = currentDay ? currentDay.date : '';
    document.getElementById('topSub').textContent = currentDay ? currentDay.location : '';
  } else {
    backBtn.classList.remove('show');
    const titles = {itinerary:'Itinéraire', info:'Vols & Réservations', tips:'Conseils'};
    document.getElementById('topTitle').textContent = titles[name] || '';
    document.getElementById('topSub').textContent = 'SINGAPOUR & JAPON 2026';
  }

  // Scroll top
  document.getElementById('main').scrollTop = 0;
  updateProgress();
}

function goBack() {
  showScreen('itinerary');
}

function updateProgress() {
  const today = getTodayDayId();
  if (!today) { document.getElementById('progressBar').style.width = '0%'; return; }
  const pct = ((today-1) / 16) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

// ════════════════════════════════════════════════════════
// RENDER: DAYS LIST
// ════════════════════════════════════════════════════════
function renderDaysList() {
  const container = document.getElementById('daysList');
  const todayId = getTodayDayId();
  let html = '';
  let lastChap = null;

  DAYS.forEach(day => {
    if (day.chap !== lastChap) {
      const ch = CHAPTERS.find(c => c.id === day.chap);
      html += `
        <div class="chapter-header">
          <div class="chapter-header-inner">
            <div class="chapter-num"><div class="chapter-num-n">${ch.num}</div></div>
            <div>
              <div class="chapter-city" style="color:#fff">${ch.city}</div>
              <div class="chapter-dates" style="color:${ch.color}">${ch.dates}</div>
              <div class="chapter-desc">${ch.desc.substring(0,80)}...</div>
            </div>
          </div>
        </div>`;
      lastChap = day.chap;
    }

    const ch = CHAPTERS.find(c => c.id === day.chap);
    const isToday = (day.id === todayId);
    const previewTypes = [...new Set(day.events.slice(0,4).map(e => e.type))];
    const pillsHtml = previewTypes.map(t => `<span class="preview-pill pill-${t}">${pillLabel(t)}</span>`).join('');
    const moreCount = day.events.length - 4;

    html += `
      <div class="day-card fade-up" onclick="openDay(${day.id})">
        <div class="day-card-header">
          <div class="day-num-badge" style="background:${ch.color}">
            <div class="day-num-j">JOUR</div>
            <div class="day-num-n" style="color:#fff">${day.dayNum}</div>
          </div>
          <div class="day-card-info">
            <div class="day-card-date">${esc(day.date)}${isToday ? ' <span class="today-indicator">AUJOURD\'HUI</span>' : ''}</div>
            <div class="day-card-loc">${esc(day.location)}</div>
          </div>
          <div class="day-card-hotel" style="background:${ch.color};color:#fff;font-size:9px;max-width:110px;line-height:1.2">${esc(day.hotel.replace(' *****',''))}</div>
        </div>
        <div class="day-card-preview">
          ${pillsHtml}
          ${moreCount > 0 ? `<span class="day-preview-more">+${moreCount} étapes</span>` : ''}
        </div>
      </div>`;
  });

  container.innerHTML = html;
}

function pillLabel(type) {
  const m = {transport:'Transport', activity:'Activité', meal:'Repas', hotel:'Séjour', show:'Spectacle', normal:'Info'};
  return m[type] || type;
}

// ════════════════════════════════════════════════════════
// RENDER: DAY DETAIL
// ════════════════════════════════════════════════════════
function openDay(id) {
  currentDay = DAYS.find(d => d.id === id);
  if (!currentDay) return;
  const ch = CHAPTERS.find(c => c.id === currentDay.chap);

  let evHtml = '';
  currentDay.events.forEach((ev, i) => {
    const isLast = i === currentDay.events.length - 1;
    const costHtml = ev.cost && ev.cost !== '—' && ev.cost !== '---'
      ? `<div class="tl-cost">${esc(ev.cost)}</div>` : '';
    evHtml += `
      <div class="tl-item type-${ev.type}">
        <div class="tl-left">
          <div class="tl-dot"></div>
          ${!isLast ? '<div class="tl-line"></div>' : ''}
        </div>
        <div class="tl-card">
          ${costHtml}
          <div class="tl-time">${esc(ev.time)}</div>
          <div class="tl-title">${esc(ev.title)}</div>
          <div class="tl-body">${esc(ev.body)}</div>
        </div>
      </div>`;
  });

  const tipHtml = currentDay.tip ? `
    <div class="tip-box">
      <div class="tip-label">BON À SAVOIR</div>
      <div class="tip-text">${esc(currentDay.tip)}</div>
    </div>` : '';

  const noteHtml = currentDay.note ? `
    <div class="note-bar">
      <div class="note-label">DEMAIN</div>
      <div class="note-text">${esc(currentDay.note)}</div>
    </div>` : '';

  document.getElementById('day-detail').innerHTML = `
    <div class="detail-header" style="background:${ch.color}20;border-bottom:2px solid ${ch.color}">
      <div style="background:${ch.color};padding:20px 16px 16px;">
        <div class="detail-day-row">
          <div class="detail-badge" style="background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.4)">
            <div class="detail-badge-j" style="color:rgba(255,255,255,.7)">JOUR</div>
            <div class="detail-badge-n" style="color:#fff">${currentDay.dayNum}</div>
          </div>
          <div class="detail-date-block">
            <div class="detail-date">${esc(currentDay.label.split('—')[0].trim())}</div>
            <div style="font-family:'Cormorant Garamond',serif;font-size:14px;color:rgba(255,255,255,.8);margin-top:2px">${esc((currentDay.label.split('—')[1]||'').trim())}</div>
            <div class="detail-loc">${esc(currentDay.location)}</div>
          </div>
          <div class="detail-hotel-pill" style="background:rgba(255,255,255,.2);color:#fff">${esc(currentDay.hotel)}</div>
        </div>
      </div>
    </div>
    <div class="timeline">
      ${evHtml}
      ${tipHtml}
      ${noteHtml}
    </div>`;

  showScreen('day');
  document.getElementById('main').scrollTop = 0;
}

  html += `</div></div><div style="height:20px"></div>`;

  document.getElementById('infoContent').innerHTML = html;
}

function renderTips() {

  // METEO
  html += `<div class="screen-section-title">Météo en août</div>`;
  const meteos = [
    {city:'SINGAPOUR', temp:'31°C', hum:'Humidité 80-90%\nPluies courtes', color:'#2A6B7C'},

  ];
  html += `<div class="meteo-grid">`;
  meteos.forEach(m => {
    html += `
      <div class="meteo-card">
        <div class="meteo-circle" style="background:${m.color}">
          <div class="meteo-temp">${esc(m.temp)}</div>

        <div><div class="essential-label">${esc(e.label)}</div><div class="essential-val">${esc(e.val)}</div></div>

  // PHRASES

  });
  html += `</div><div style="height:20px"></div>`;

  document.getElementById('tipsContent').innerHTML = html;
}
