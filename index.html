<!DOCTYPE html>
<html lang="fr">
<head>

<title>Singapour et Japon 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:#1a1a1a;height:100%;overflow:hidden}
html{height:100%}
/* COVER - shown by default */
#cover{position:fixed;inset:0;z-index:999;background:#1a1a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 24px;gap:0}
.cv-tag{font-size:10px;font-weight:700;letter-spacing:4px;color:#C9A84C;text-transform:uppercase;margin-bottom:18px}
.cv-big{font-size:clamp(42px,13vw,62px);font-weight:800;color:#fff;line-height:.9;text-align:center}
.cv-amp{font-size:20px;color:#C9A84C;margin:8px 0}
.cv-line{width:60px;height:2px;background:#C9A84C;margin:14px auto}
.cv-date{font-size:12px;font-weight:600;color:#F2E6C2;letter-spacing:2px}
.cv-stats{display:flex;gap:10px;margin-top:22px}
.cv-stat{background:#272727;border-radius:10px;padding:11px 15px;text-align:center}
.cv-sn{font-size:24px;font-weight:800;color:#C9A84C;line-height:1}
.cv-sl{font-size:9px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.cv-route{display:flex;align-items:center;gap:5px;margin-top:18px;flex-wrap:wrap;justify-content:center}
.cv-route span{font-size:9px;font-weight:700;letter-spacing:1.5px;color:#aaa;text-transform:uppercase}
.cv-dot{width:4px;height:4px;border-radius:50%;background:#C9A84C;flex-shrink:0}
.cv-hl{color:#C9A84C !important}
#startBtn{margin-top:30px;background:#C9A84C;color:#1a1a1a;border:none;border-radius:50px;padding:16px 44px;font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer;-webkit-appearance:none;appearance:none;display:block}
/* APP - hidden by default */
#app{display:none;height:100dvh;flex-direction:column;overflow:hidden}
/* TOP BAR */
#topbar{background:#1a1a1a;padding:calc(env(safe-area-inset-top,12px) + 12px) 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:2px solid #C9A84C;flex-shrink:0}
#backBtn{background:#2a2a2a;border:none;border-radius:8px;padding:8px 12px;color:#C9A84C;font-size:13px;font-weight:700;cursor:pointer;display:none}
#backBtn.show{display:block}
#nextBtn{background:#C9A84C;border:none;border-radius:8px;padding:8px 12px;color:#1a1a1a;font-size:13px;font-weight:700;cursor:pointer;display:none;white-space:nowrap}
#nextBtn.show{display:block}
#topTitle{flex:1;font-size:16px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#topSub{font-size:10px;color:#C9A84C;letter-spacing:1px;font-weight:500}
.prog{background:#2a2a2a;height:3px;flex-shrink:0}
.prog-fill{height:100%;background:#C9A84C;width:0%;transition:width .4s}
/* BOTTOM NAV */
#bnav{background:#1a1a1a;border-top:1px solid #333;display:flex;padding-bottom:env(safe-area-inset-bottom,0px);flex-shrink:0}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px;gap:4px;cursor:pointer;border:none;background:none}
.nb-i{font-size:18px;color:#555}
.nb-l{font-size:9px;font-weight:700;letter-spacing:.5px;color:#555;text-transform:uppercase}
.nb.on .nb-i,.nb.on .nb-l{color:#C9A84C}
/* MAIN */
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:#FEFDF8}
.scr{display:none;min-height:100%}
.scr.on{display:block}
/* DAYS */
.dw{padding:14px;display:flex;flex-direction:column;gap:8px}
.ch{background:#1a1a1a;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.ch-n{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ch-nn{font-size:18px;font-weight:800;color:#fff}
.ch-city{font-size:19px;font-weight:800;color:#fff}
.ch-d{font-size:11px;font-weight:600;margin-top:2px}
.dc{background:#fff;border-radius:12px;overflow:hidden;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.dc:active{transform:scale(.98)}
.dc-top{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #f0ead4}
.db{width:36px;height:36px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.db-j{font-size:7px;font-weight:700;color:#fff;letter-spacing:1px}
.db-n{font-size:15px;font-weight:800;color:#fff;line-height:1}
.di{flex:1;min-width:0}
.di-d{font-size:13px;font-weight:700;color:#1a1a1a}
.di-l{font-size:11px;color:#2A6B7C;font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dh{font-size:9px;padding:4px 8px;border-radius:20px;font-weight:700;white-space:nowrap;flex-shrink:0;color:#fff;text-align:center;max-width:100px;line-height:1.3}
.dp{padding:8px 14px 12px;display:flex;gap:5px;flex-wrap:wrap}
.pl{font-size:10px;padding:4px 10px;border-radius:20px;font-weight:600}
.t-tp{background:#EAF4F7;color:#2A6B7C}
.t-ac{background:#FAF6EE;color:#7a5c0a}
.t-me{background:#FDF0EE;color:#C8573F}
.t-sh{background:#F2EEF8;color:#5B3A7E}
.t-ht{background:#EEF5F0;color:#2E6B3E}
.pm{font-size:10px;color:#aaa;padding:4px 8px}
.tb{background:#C9A84C;color:#1a1a1a;font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:5px}
/* DETAIL */
.dh2{padding:16px 16px 14px}
.dhr{display:flex;align-items:center;gap:12px}
.dbg{width:48px;height:48px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.4);flex-shrink:0}
.dbg-j{font-size:8px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:1px}
.dbg-n{font-size:20px;font-weight:800;color:#fff;line-height:1}
.dd{flex:1;min-width:0}
.dd-d{font-size:17px;font-weight:800;color:#fff}
.dd-s{font-size:12px;color:rgba(255,255,255,.75);margin-top:2px}
.dd-l{font-size:11px;font-weight:600;letter-spacing:1px;margin-top:3px}
.dhp{font-size:10px;font-weight:700;padding:6px 10px;border-radius:20px;background:rgba(255,255,255,.2);color:#fff;text-align:center;flex-shrink:0;max-width:110px;line-height:1.3}
/* TIMELINE */
.tl{padding:14px;display:flex;flex-direction:column}
.tr{display:flex;gap:10px}
.tll{display:flex;flex-direction:column;align-items:center;width:14px;flex-shrink:0}
.tld{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:14px}
.tlln{width:2px;flex:1;min-height:10px}
.tc{flex:1;border-radius:12px;padding:12px 12px 10px;margin-bottom:10px;position:relative}
.tt{font-size:10px;font-weight:700;letter-spacing:.5px;margin-bottom:4px}
.tti{font-size:14px;font-weight:700;color:#1a1a1a;line-height:1.3;margin-bottom:5px;padding-right:80px}
.tb2{font-size:12px;color:#666;line-height:1.5}
.tc2{position:absolute;top:10px;right:10px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;max-width:88px;overflow:hidden;text-overflow:ellipsis;text-align:center}
.maps-btn{display:inline-flex;align-items:center;gap:4px;margin-top:7px;background:#EAF4F7;color:#2A6B7C;border:none;border-radius:20px;padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;-webkit-appearance:none}
.info-btn{display:inline-flex;align-items:center;gap:4px;margin-top:7px;background:#5B3A7E;color:#fff;border:none;border-radius:20px;padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer;-webkit-appearance:none}
.info-overlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.6);align-items:flex-end;justify-content:center}
.info-overlay.open{display:flex}
.info-sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px 20px 36px;max-height:75vh;overflow-y:auto;width:100%;max-width:480px}
.info-sheet-title{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:12px;padding-right:32px;line-height:1.4}
.info-sheet-body{font-size:13px;color:#444;line-height:1.7;white-space:pre-wrap}
.info-sheet-close{position:absolute;top:16px;right:16px;background:#f0f0f0;border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#666}
.info-sheet-header{position:relative}
.tp .tc{background:#EAF4F7}.tp .tld{background:#2A6B7C}.tp .tlln{background:rgba(42,107,124,.2)}.tp .tt{color:#2A6B7C}.tp .tc2{background:#2A6B7C;color:#fff}
.ta .tc{background:#FAF6EE}.ta .tld{background:#C9A84C}.ta .tlln{background:rgba(201,168,76,.2)}.ta .tt{color:#7a5c0a}.ta .tc2{background:#C9A84C;color:#1a1a1a}
.tm .tc{background:#FDF0EE}.tm .tld{background:#C8573F}.tm .tlln{background:rgba(200,87,63,.2)}.tm .tt{color:#C8573F}.tm .tc2{background:#C8573F;color:#fff}
.th .tc{background:#EEF5F0}.th .tld{background:#2E6B3E}.th .tlln{background:rgba(46,107,62,.2)}.th .tt{color:#2E6B3E}.th .tc2{background:#2E6B3E;color:#fff}
.ts .tc{background:#F2EEF8}.ts .tld{background:#5B3A7E}.ts .tlln{background:rgba(91,58,126,.2)}.ts .tt{color:#5B3A7E}.ts .tc2{background:#5B3A7E;color:#fff}
.tipb{background:#FAF6EE;border-left:3px solid #C9A84C;border-radius:10px;padding:12px 14px;margin:4px 0 10px}
.tipl{font-size:10px;font-weight:700;color:#C9A84C;letter-spacing:1px;margin-bottom:4px}
.tipt{font-size:12px;color:#2C2C2C;line-height:1.5}
.noteb{background:#1a1a1a;border-radius:10px;padding:12px 14px;margin-bottom:20px}
.notel{font-size:10px;font-weight:700;color:#C9A84C;letter-spacing:1px;margin-bottom:3px}
.notet{font-size:12px;color:#ccc;line-height:1.4}
/* INFO */
.iw{padding:14px}
.st{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#C9A84C;padding:14px 0 8px;display:flex;align-items:center;gap:8px}
.st::after{content:"";flex:1;height:1px;background:rgba(201,168,76,.2)}
.vc{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:10px;border-left:4px solid #C9A84C}
.vi{padding:13px 14px}
.vt{font-size:10px;font-weight:700;color:#C9A84C;letter-spacing:1px;margin-bottom:4px}
.vr{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:3px}
.vd{font-size:11px;color:#666}
.vo{font-size:10px;font-weight:700;color:#2E6B3E;margin-top:4px}
.hl{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:12px}
.hr2{padding:11px 14px;border-bottom:1px solid #f4f4f4;display:flex;gap:10px;align-items:flex-start}
.hr2:last-child{border-bottom:none}
.hn{font-size:13px;font-weight:700;color:#1a1a1a}
.hs{font-size:10px;color:#C9A84C;font-weight:600;margin-top:1px}
.ha{font-size:11px;color:#666;margin-top:1px}
.href{font-size:10px;font-weight:700;color:#5B3A7E;white-space:nowrap}
.rc{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:10px;border:1px solid rgba(201,168,76,.2)}
.rh{padding:12px 14px 8px;display:flex;gap:10px;align-items:flex-start}
.rd{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0;color:#fff}
.rn{font-size:14px;font-weight:700;color:#1a1a1a;line-height:1.3}
.rdt{font-size:11px;color:#666;margin-top:2px;line-height:1.4}
.rf{padding:8px 14px 10px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.trl{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:20px}
.trr{padding:11px 14px;border-bottom:1px solid #f4f4f4;display:flex;justify-content:space-between;gap:10px}
.trr:last-child{border-bottom:none}
.trl2{font-size:12px;font-weight:700;color:#1a1a1a}
.trv{font-size:11px;color:#666;text-align:right;max-width:55%;line-height:1.4}
/* TIPS */
.tw{padding:14px}
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
.mc{background:#fff;border-radius:12px;padding:12px 8px;text-align:center}
.mcir{width:50px;height:50px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center}
.mct{font-size:14px;font-weight:800;color:#fff}
.mcc{font-size:10px;font-weight:700;color:#1a1a1a;margin-bottom:3px}
.mch{font-size:9px;color:#666;line-height:1.4}
.phl{display:flex;flex-direction:column;gap:6px;margin-bottom:4px}
.phr{background:#fff;border-radius:10px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.phj{font-size:13px;font-weight:700;color:#1a1a1a}
.phf{font-size:11px;color:#666;font-style:italic;text-align:right}
.el{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.er{background:#fff;border-radius:10px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start}
.edd{width:8px;height:8px;border-radius:50%;background:#C9A84C;flex-shrink:0;margin-top:4px}
.ela{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
.elv{font-size:11px;color:#666;line-height:1.4}
::-webkit-scrollbar{width:0}
</style>
</head>

  "Garden Rhapsody - Spectacle GRATUIT":{
    title:"Garden Rhapsody - Spectacle gratuit",
    body:"LE spectacle incontournable de Singapour.\nLes 18 Supertrees s illuminent en rythme avec la musique.\nCouleurs spectaculaires, totalement GRATUIT.\n\nSpectacle tous les soirs a 19h45 et 20h45.\nArriver 15 min avant pour s installer au pied des Supertrees.\nLe spectacle de 19h45 est moins bonde que celui de 20h45.\n\nAPRES LE SPECTACLE :\nSe diriger vers le bord de l eau.\nVue nocturne spectaculaire sur Marina Bay Sands illumine.\nSpectra (spectacle lumiere sur la facade MBS) a 21h00 - a ne pas rater !\nPhotos panoramiques de nuit."
  }
,
  "Light and Music Showcase":{
    title:"Light and Music Showcase - Rain Vortex",
    body:"Spectacle lumiere et musique GRATUIT sur le Rain Vortex.\n\n14 aout = JEUDI -> spectacles a 20h00 et 21h00\n(Lun-Jeu : 2 shows  Ven-Dim : 3 shows)\n\nLes Supertrees et la cascade s illuminent de couleurs spectaculaires.\n\nMeilleur spot : niveaux 3-4 face a la cascade.\nArriver 10 min avant pour avoir une bonne place."
  }
,
  "Petit-dejeuner Killiney Kopitiam":{
    title:"Petit-dejeuner - Options recommandees",
    body:"BUFFET PAN PACIFIC (~33 EUR/pers) = A EVITER\n\nOPTION 1 - Kopitiam singapourien (RECOMMANDE) :\nKilliney Kopitiam - Lucky Plaza, 304 Orchard Rd #01-10 (~5 min a pied)\nOuvert des 6h30 - kaya toast + oeufs demi-cuits + kopi ~3-4 EUR/pers\nPetit-dejeuner 100% local, authentique et delicieux !\n\nOPTION 2 - Ya Kun Kaya Toast / Toast Box :\nYa Kun Tang Plaza B1, 310 Orchard Rd (~8 min) - ouvert 7h30\nToast Box ION Orchard B4, 2 Orchard Turn (~10 min) - ouvert 7h30\nSet kaya toast + oeufs + boisson : ~4-5 EUR/pers\n\nOPTION 3 - Starbucks :\nStarbucks Delfi Orchard, 402 Orchard Rd #01-01 (~5 min) - ouvert 6h30\nStarbucks Paragon, 290 Orchard Rd B1 (~8 min) - ouvert 7h30\nBoisson + sandwich/viennoiserie : ~8-10 EUR/pers\n\nOPTION 4 - Hawker court (le moins cher) :\nLucky Food Centre, Lucky Plaza 304 Orchard Rd (~5 min) - ouvert 7h00\nHawkers Street Tang Plaza B1 (ouvert 8h30) - cuisine locale, ~3-5 EUR/pers\n\nPROFITEZ ENSUITE DE LA PISCINE DU PAN PACIFIC :\nPiscine principale 22m free-form, entouree de verdure, ambiance resort tropical.\nAqua Bar en piscine : jus frais ou cocktail depuis l eau.\nHoraires piscine : 7h30 - 21h00 - reservee aux clients de l hotel.\nFin de session vers 11h00 -> environ 15 min pour se changer avant le depart."
  },
  "Sri Veeramakaliamman Temple - Little India":{
    title:"Sri Veeramakaliamman Temple",
    body:"ACCES :\nPrendre un Grab depuis le hall du Pan Pacific Orchid direction Little India.\nTrajet ~12-15 min. Commander le Grab depuis l application mobile.\n\nLE TEMPLE :\nTemple hindou dravidien parmi les plus colores de Singapour.\nFacade couverte de sculptures mythologiques (gopuram) aux couleurs vives.\nEntree libre - retirer les chaussures avant d entrer.\nVisite express ~15-20 min - tres photogenique !\n141 Serangoon Road - ouvert des 5h30."
  }
,
  "Buddha Tooth Relic Temple - Chinatown":{
    title:"Buddha Tooth Relic Temple",
    body:"ACCES :\nPrendre un Grab depuis Serangoon Road (Little India) direction Chinatown.\nTrajet ~10-15 min. Commander le Grab depuis la rue devant le temple.\n\nLE TEMPLE :\nTemple bouddhiste majestueux dedie a la dent sacree du Bouddha.\nArchitecture Tang Dynasty impressionnante sur 5 niveaux - entree gratuite.\nMusee bouddhiste et salle de la relique accessibles au public.\nTenue correcte exigee - sarongs disponibles a l entree si besoin.\nVisite express ~15-20 min - ideal pour une halte rapide avant la plage !"
  },
  "Tanjong Beach Club - Session Daybed 3h":{
    title:"Tanjong Beach Club - Session Daybed",
    body:"ACCES :\nPrendre un Grab depuis South Bridge Road (Chinatown) direction Sentosa.\nTrajet Chinatown -> Sentosa : ~20-25 min en Grab.\nDemander au chauffeur de deposer directement au Tanjong Beach Club si possible.\nOu descendre a Sentosa Gate + Beach Tram gratuit jusqu a Tanjong Beach.\nCompter ~40-50 min total -> arrivee ~13h00-13h15, parfait avant la session 13h30 !\n\nSESSION DAYBED 13h30 -> 16h30 (3h fixes - reserver le 16/07 !)\n\nDEJEUNER SUR PLACE :\n- Seafood linguini, fish & chips, planche de fruits de mer\n- Burgers, salades, plats beach-club\n- Budget repas : ~20-35 EUR/pers\n\nPiscine + acces plage de sable blanc, ambiance DJ house/chill.\nCocktails signature (~11-14 EUR/verre) : Tanjong Coast, Copabanana...\nDaybeds pool/beach (minimum spend compris dans les consommations).\nPool adultes uniquement.\n\nFIN DE SESSION 16h30 :\nQuitter le Tanjong Beach Club.\nRetour a l hotel Pan Pacific Orchid en Grab depuis le TBC (~20-25 min).\nDouche + changement a l hotel avant la soiree.\nProfitez du temps libre a l hotel - repartir vers 19h00."
  }
,
  "Croisiere Singapore River - 40 min":{
    title:"Croisiere Singapore River",
    body:"ACCES :\nPrendre un Grab depuis le Pan Pacific Orchid direction Clarke Quay Jetty.\nTrajet ~10-15 min.\nArriver a Clarke Quay vers 19h15 pour le depart de la croisiere a 19h30.\n\nLA CROISIERE :\nCroisiere sur la Singapore River depuis Clarke Quay.\nDuree : 40-45 minutes - retour au point de depart vers 20h15.\nPanorama magnifique sur la skyline de Singapour en soiree illuminee.\nOperateurs : Singapore River Cruises / Bumboat (~15 SGD/pers).\nAcheter les billets sur place ou reserver en avance sur Klook.\n\nAPRES LA CROISIERE :\nPrendre un Grab depuis Clarke Quay Jetty direction Marina Bay Sands.\nTrajet ~8-12 min.\nArriver devant l Event Plaza MBS vers 20h30-20h45 pour s installer avant Spectra a 21h00."
  }
,
  "Spectra - Spectacle MBS GRATUIT":{
    title:"Spectra - Spectacle MBS",
    body:"Spectacle son, lumiere et jets d eau sur la facade de Marina Bay Sands - totalement GRATUIT.\nFaisceaux laser, mapping lumineux et musique entrainante.\n\nSpectra tous les soirs : 21h00 (et 22h00 Ven-Sam).\n\nMeilleur spot : Event Plaza face a MBS, cote waterfront.\nArriver 10 min avant pour avoir une bonne place au bord de l eau."
  },
  "Clarke Quay - Bars et Street Food":{
    title:"Clarke Quay - Fin de soiree",
    body:"Retour a Clarke Quay pour terminer la soiree dans l ambiance festive du quartier.\nGrab depuis MBS -> Clarke Quay (~10 min, ~5-8 EUR).\n\nStreet food, hawker stalls et bars tout au long de la riviere.\nRecommandes : Crazy Elephant, Attica, Pump Room, Zouk.\nAmbiance tres animee le samedi soir - quartier le plus festif de Singapour !\n\nFin de soiree a Clarke Quay. Prendre un Grab pour rentrer a l hotel.\nNuit 3/3 au Pan Pacific Orchid.\n\nATTENTION - Demain 17 aout : check-out Pan Pacific -> Mondrian Singapour."
  }
,
  "Dernier matin Pan Pacific - Piscine + Buffet":{
    title:"Dernier matin Pan Pacific Orchid",
    body:"Dernier matin au Pan Pacific Orchid (5 etoiles).\nBuffet petit-dejeuner au restaurant Mosella ou Claymore.\nC est le dernier matin dans cet hotel - profitez bien du buffet avant le check-out !\n\nPISCINE :\nProfiter des 2 piscines exterieures du Pan Pacific.\nPiscine principale : 22m free-form, entoure de verdure, ambiance resort tropical.\nAqua Bar (bar en piscine) : commandez un jus frais ou un cocktail depuis l eau !\nInstallez-vous sur les sun loungers avec vue sur Orchard Road.\nHoraires piscine : 7h30 - 21h00 - reservee aux clients de l hotel.\nDernier bain avant le Japon - profitez-en bien !"
  },
  "Check-out Pan Pacific Orchid":{
    title:"Check-out Pan Pacific Orchid",
    body:"Check-out du Pan Pacific Orchid (heure limite generalement 12h00).\nDemander la veille si possible un late check-out jusqu a 12h30-13h.\nDeposer les bagages en consigne a la reception (bell desk) si besoin.\nLes hotels de luxe gardent volontiers les bagages jusqu a votre depart."
  },
  "Dejeuner - Maxwell Food Centre":{
    title:"Dejeuner - Maxwell Food Centre",
    body:"ACCES :\nPrendre un Grab depuis le Pan Pacific Orchid direction Maxwell Food Centre.\nA 2 min a pied du Mondrian - ideal de deposer les bagages au Mondrian en arrivant\n(meme si check-in pas encore dispo) puis dejeuner juste a cote.\n\nHawker centre mythique de Singapour !\nIncontournables :\n- Hainanese Chicken Rice (Tian Tian Chicken, stall #01-10 - file = gage de qualite)\n- Popiah (rouleaux de printemps frais, ~3 SGD)\n- Fried Carrot Cake (chai tow kway)\n- Rojak (salade de fruits et legumes a la sauce noire)\n\nBudget : ~5-8 SGD (~3-5 EUR) par plat.\nMangez a l interieur (air conditionne) pour echapper a la chaleur."
  },
  "Check-in Mondrian Singapore Duxton":{
    title:"Check-in Mondrian Singapore Duxton",
    body:"Check-in au Mondrian Singapore Duxton (5 etoiles).\nHotel design situe sur Duxton Hill, quartier branche entre Chinatown et le CBD.\nArchitecture Art Deco reinterpretee, design tres instagrammable.\n302 chambres avec vue sur la skyline ou les shophouses historiques.\n\nCheck-in standard a 15h - si les chambres sont pretes avant, demandez a acceder.\nLaisser les bagages en consigne si la chambre n est pas encore disponible."
  },
  "Canyon Club Rooftop Pool - Infinity Pool":{
    title:"Canyon Club - Rooftop Infinity Pool",
    body:"LE moment phare de la journee : le rooftop infinity pool du Mondrian !\n\nPiscine a debordement avec VUE PANORAMIQUE sur :\n- Les shophouses de Duxton Hill (maisons coloniales historiques)\n- La skyline du CBD et des gratte-ciels de Singapour\n\nCanyon Club Bar : cocktails californiens, ambiance Hollywood 1970s.\nHappy Hour : selections a ~8 SGD (~5 EUR).\nCabanas disponibles (a reserver a l avance si possible).\n\nPiscine RESERVEE aux clients de l hotel de 7h a 17h30.\nDe 17h30 a 22h30, ouverte au public - arrivez avant 15h pour profiter en exclusivite.\nMusique jouee a la piscine - journee detente garantie !"
  },
  "Diner leger - Bottega di Carna ou Maxwell":{
    title:"Diner - Options ce soir",
    body:"OPTION 1 - Diner au Mondrian (pratique) :\n- Bottega di Carna : cuisine italienne contemporaine (pastas fraiches, crudo, gnocchi)\n- Christina s : bar/restaurant cocktails signature et cuisine creative\n- Room service 24h/24 (tres pratique si fatigue)\n\nOPTION 2 - Maxwell Food Centre (2 min a pied, economique) :\n- Retour au hawker centre pour un diner leger et pas cher.\n- Ideal pour manger local une derniere fois avant le Japon.\n\nPrivilegier un repas LEGER - decollage tot demain matin.\n\nPROMENADE DIGESTIVE :\nCourte balade dans le quartier Duxton Hill.\nDuxton Road et Club Street : architecture coloniale et restaurants tendance.\nNe pas trop s eloigner - soiree courte avant le lever a 04h00 !"
  }
,
  "Reveil + Check-out Mondrian":{
    title:"Reveil 04h00 - Depart pour l aeroport",
    body:"CHECKLIST AVANT DE QUITTER LA CHAMBRE :\n- Passeports + boarding pass Scoot verifies (telecharges la veille)\n- Bagages fermes et peses (soute max 20 kg / cabine max 10 kg / 54x38x23 cm)\n- Express check-out Mondrian (laisser la cle a la reception ou en boite)\n- Grab commande la veille pour 04h30\n\nTrajet Mondrian -> Changi T1 (~25-30 min a cette heure).\nA 4h30 du matin : peu de circulation - trajet rapide.\nCommander le Grab depuis l app avant d aller dormir.\n\nARRIVEE TERMINAL 1 CHANGI :\n05h00 -> Comptoir Scoot - enregistrement + depot bagages soute\n05h30 -> Controle securite + immigration depart (~30 min)\n06h10 -> Direction gate d embarquement\n06h20 -> Embarquement Scoot TR898\n\nChangi T1 est tres bien organise - suivre panneaux Departures.\nDuty Free accessible apres la securite si temps."
  },
  "Arrivee KIX - Formalites + JR Pass":{
    title:"Arrivee KIX - Formalites",
    body:"Atterrissage a Kansai International Airport (KIX).\n14h35 -> Atterrissage - se diriger vers l immigration\n         (file Visitors - prevoir 30-45 min en aout, haute saison)\n15h00 -> Recuperation bagages (carrousels cote international)\n15h20 -> Douane + sortie cote arrivees\n\nJR KANSAI-HIROSHIMA AREA PASS :\nSi commande sur Klook, echanger le voucher au bureau JR dans le terminal arrivees.\nPresenter le passeport + le voucher.\nActiver le pass des aujourd hui si vous prenez le train JR vers Osaka.\n\nRETRAIT DE YENS :\nDAB dans le terminal arrivees (7-Eleven ATM ou Japan Post Bank).\nCes DAB acceptent les cartes etrangeres."
  },
  "Haruka Express KIX vers Osaka Station":{
    title:"Transport KIX -> Osaka",
    body:"OPTION A - Haruka Express (RECOMMANDE si JR Pass) :\nKIX -> Tennoji (~30 min) puis Osaka Station (~50 min total).\nInclus dans le JR Kansai-Hiroshima Pass !\nConfortable, direct, avec espace bagages.\n\nOPTION B - Rapid Train JR (sans pass, moins cher) :\nKIX -> Shin-Imamiya (~65 min) - ~1 100 yens (~6,50 EUR/pers).\nPlus lent mais economique."
  },
  "Check-in Candeo Hotel Osaka The Tower":{
    title:"Check-in Candeo Hotel Osaka",
    body:"Arrivee au Candeo Hotel Osaka The Tower - votre base pour 3 nuits !\nSitue dans le quartier Namba / Shinsaibashi - coeur d Osaka.\nTour moderne avec rooftop sky bath et sauna.\n\nCheck-in standard : 15h00 - chambres probablement disponibles a votre arrivee.\nLaisser les bagages en consigne si les chambres ne sont pas pretes.\nRecuperer la carte magnetique d acces au sky bath rooftop."
  },
  "Promenade Dotonbori - Premier apercu":{
    title:"Dotonbori - Premier apercu",
    body:"Dotonbori est a quelques minutes a pied de l hotel - parfait pour un premier apercu !\nLe canal Dotonbori et ses enseignes geantes illuminees des la tombee du jour.\nPanneau Kani Doraku (crabe geant anime) - photo incontournable !\nCommencer a reperer les restaurants pour le lendemain.\n\nLa soiree sera courte - vous avez peu dormi ! Ne pas trop s epuiser.\nObserver l ambiance du quartier, reperer le Glico Man (homme qui court - panneau emblematique)."
  },
  "Diner - Premier repas japonais !":{
    title:"Premier repas japonais - Osaka",
    body:"Premier repas japonais sur le sol d Osaka - bienvenue au pays de la street food !\n\nA tester ce soir (leger - vous etes fatigues) :\n- Takoyaki (boulettes de pieuvre) - specialite d Osaka - ~5 EUR/portion\n  Stands Dotonbori (Wanaka, Creo-ru) ou Kuromon Market\n- Okonomiyaki (galette savoureuse) - autre must d Osaka - ~10 EUR/pers\n  Kiji, Yukari ou Mizuno (restaurant dedie)\n- Ramen ou udon simple pour rester leger\n\nCONSEIL : manger leger ce soir - journee eprouvante, lever a 4h.\nGarder l appetit pour demain !"
  },
  "Sky Bath Rooftop Candeo Hotel":{
    title:"Sky Bath Rooftop - Candeo Hotel",
    body:"LE moment parfait apres cette longue journee de transit !\nCandeo Hotel Osaka The Tower - SKY BATH en rooftop :\n- Bains interieur et exterieur avec VUE PANORAMIQUE sur Osaka la nuit\n- Sauna - Bains chauds - Zone de detente\n- Acces inclus pour les clients de l hotel !\n\nSe prelasser dans un bain chaud en contemplant les lumieres d Osaka = experience unique.\n\nHoraires Sky Bath : generalement 15h-24h (verifier a la reception).\nServiettes fournies par l hotel - Yukata disponible en chambre.\nBains separes hommes/femmes - se retrouver en zone relaxation apres.\nTatouages interdits dans la plupart des onsen/bains japonais."
  }
};

function e(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function getTid(){var n=new Date(),s=new Date(2026,7,13),d=Math.floor((n-s)/86400000);return(d>=0&&d<17)?d+1:null}

function updProg(){var t=getTid();document.getElementById("pf").style.width=(t?(t-1)/16*100:0)+"%"}

function showS(k){
  ["it","dy","in","ti"].forEach(function(x){
    document.getElementById("s-"+x).classList.remove("on");
    var nb=document.getElementById("n-"+x);
    if(nb)nb.classList.remove("on");
  });
  document.getElementById("s-"+k).classList.add("on");
  var nb2=document.getElementById("n-"+k);
  if(nb2)nb2.classList.add("on");
  var bb=document.getElementById("backBtn");
  bb.style.display=k==="dy"?"block":"none";
  var nb2=document.getElementById("nextBtn");
  if(k==="dy"){
    var idx=curDay?DYS.findIndex(function(d){return d.id===curDay.id}):-1;
    nb2.style.display=(idx>=0 && idx<DYS.length-1)?"block":"none";
  } else {
    nb2.style.display="none";
  }
  var tt=document.getElementById("topTitle");
  var ts=document.getElementById("topSub");
  if(k==="dy"){tt.textContent=curDay?curDay.date:"";ts.textContent=curDay?curDay.location:""}
  else{var nm={it:"Itineraire",in:"Vols et Reservations",ti:"Conseils"};tt.textContent=nm[k]||"";ts.textContent="SINGAPOUR & JAPON 2026"}
  document.getElementById("main").scrollTop=0;
}

function goBack(){showS("it")}

function nextDay(){
  if(!curDay) return;
  var idx = DYS.findIndex(function(d){return d.id===curDay.id});
  if(idx < DYS.length-1){
    openDay(DYS[idx+1].id);
    document.getElementById("main").scrollTop=0;
  }
}

function buildDays(){
  var h="",last=null,tid=getTid();
  DYS.forEach(function(day){
    if(day.chap!==last){
      var ch=CHS.find(function(c){return c.id===day.chap});
      h+='<div class="ch"><div class="ch-n" style="background:'+ch.color+'"><span class="ch-nn">'+ch.num+'</span></div>';
      h+='<div><div class="ch-city">'+e(ch.city)+'</div><div class="ch-d" style="color:'+ch.color+'">'+e(ch.dates)+'</div></div></div>';
      last=day.chap;
    }
    var ch=CHS.find(function(c){return c.id===day.chap});
    var types=[],seen={};
    day.events.slice(0,4).forEach(function(ev){if(!seen[ev.type]){seen[ev.type]=1;types.push(ev.type)}});
    var pills=types.map(function(t){return'<span class="pl '+pcls(t)+'">'+plbl(t)+'</span>'}).join("");
    var more=day.events.length-4;
    var today=(day.id===tid)?'<span class="tb">AUJOURD HUI</span>':"";
    h+='<div class="dc" onclick="openDay('+day.id+')">';
    h+='<div class="dc-top"><div class="db" style="background:'+ch.color+'"><span class="db-j">JOUR</span><span class="db-n">'+day.dayNum+'</span></div>';
    h+='<div class="di"><div class="di-d">'+e(day.date)+today+'</div><div class="di-l">'+e(day.location)+'</div></div>';
    h+='<div class="dh" style="background:'+ch.color+'">'+e(day.hotel.replace(" *****",""))+'</div></div>';
    h+='<div class="dp">'+pills+(more>0?'<span class="pm">+'+more+'</span>':"")+'</div></div>';
  });
  document.getElementById("dl").innerHTML=h;
}
