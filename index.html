<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SG Japon 2026">
<meta name="theme-color" content="#1A1A1A">
<title>Singapour et Japon 2026</title>
<style>
:root{--gold:#C9A84C;--gold-light:#F2E6C2;--gold-pale:#FAF6EE;--dark:#1A1A1A;--dark2:#2C2C2C;--grey:#666;--grey-light:#AAA;--grey-pale:#F4F4F2;--cream:#FEFDF8;--teal:#2A6B7C;--teal-pale:#EAF4F7;--coral:#C8573F;--coral-pale:#FDF0EE;--green:#2E6B3E;--green-pale:#EEF5F0;--purple:#5B3A7E;--purple-pale:#F2EEF8;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#1A1A1A;font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;overflow:hidden;}
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
/* COVER */
#cover{position:absolute;inset:0;z-index:100;background:var(--dark);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;transition:opacity .5s,transform .5s;}
#cover.gone{opacity:0;transform:translateY(-30px);pointer-events:none;}
.cv-tag{font-size:10px;font-weight:700;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:20px;}
.cv-t1{font-size:clamp(44px,14vw,64px);font-weight:800;color:#fff;line-height:.9;text-align:center;}
.cv-amp{font-size:20px;color:var(--gold);margin:8px 0;}
.cv-line{width:70px;height:2px;background:var(--gold);margin:16px auto;}
.cv-date{font-size:13px;font-weight:500;color:var(--gold-light);letter-spacing:2px;}
.cv-stats{display:flex;gap:12px;margin-top:24px;}
.cv-stat{background:#272727;border-radius:10px;padding:12px 16px;text-align:center;}
.cv-stat-n{font-size:26px;font-weight:800;color:var(--gold);line-height:1;}
.cv-stat-l{font-size:9px;font-weight:600;color:#AAA;text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
.cv-route{display:flex;align-items:center;gap:5px;margin-top:20px;flex-wrap:wrap;justify-content:center;}
.cv-route span{font-size:9px;font-weight:700;letter-spacing:1.5px;color:#AAA;text-transform:uppercase;}
.cv-route .dot{width:4px;height:4px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.cv-route .hl{color:var(--gold);}
.cv-btn{margin-top:32px;background:var(--gold);color:#1A1A1A;border:none;border-radius:50px;padding:16px 40px;font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer;box-shadow:0 8px 30px rgba(201,168,76,.4);}
.cv-btn:active{transform:scale(.96);}
/* TOP BAR */
#topbar{background:var(--dark);padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--gold);flex-shrink:0;}
.tb-back{background:#2a2a2a;border:none;border-radius:8px;padding:8px 12px;color:var(--gold);font-size:13px;font-weight:700;cursor:pointer;display:none;}
.tb-back.show{display:block;}
.tb-title{flex:1;font-size:17px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tb-sub{font-size:10px;color:var(--gold);letter-spacing:1px;font-weight:500;}
/* PROGRESS */
.prog-wrap{background:#2a2a2a;height:3px;flex-shrink:0;}
.prog-fill{height:100%;background:var(--gold);transition:width .4s;}
/* BOTTOM NAV */
#bottomnav{background:var(--dark);border-top:1px solid #333;display:flex;padding-bottom:env(safe-area-inset-bottom,0px);flex-shrink:0;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px;gap:4px;cursor:pointer;border:none;background:none;}
.nav-ico{font-size:18px;color:#555;}
.nav-lbl{font-size:9px;font-weight:700;letter-spacing:.5px;color:#555;text-transform:uppercase;}
.nav-btn.active .nav-ico,.nav-btn.active .nav-lbl{color:var(--gold);}
/* MAIN */
#main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--cream);}
.screen{display:none;min-height:100%;}
.screen.active{display:block;}
/* DAYS LIST */
.days-wrap{padding:14px;display:flex;flex-direction:column;gap:8px;}
.chap-head{background:var(--dark);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:2px;}
.chap-num{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chap-num-n{font-size:19px;font-weight:800;color:#fff;line-height:1;}
.chap-city{font-size:20px;font-weight:800;color:#fff;}
.chap-dates{font-size:11px;font-weight:600;margin-top:2px;}
.day-card{background:#fff;border-radius:12px;overflow:hidden;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.07);transition:transform .15s;}
.day-card:active{transform:scale(.98);}
.day-card-top{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #f0ead4;}
.day-badge{width:38px;height:38px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.day-badge-j{font-size:7px;font-weight:700;color:#fff;letter-spacing:1px;}
.day-badge-n{font-size:16px;font-weight:800;color:#fff;line-height:1;}
.day-info{flex:1;min-width:0;}
.day-date{font-size:13px;font-weight:700;color:var(--dark);}
.day-loc{font-size:11px;color:var(--teal);font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.day-hotel-pill{font-size:9px;padding:4px 8px;border-radius:20px;font-weight:700;white-space:nowrap;flex-shrink:0;line-height:1.2;text-align:center;max-width:100px;}
.day-pills{padding:8px 14px 12px;display:flex;gap:5px;flex-wrap:wrap;}
.pill{font-size:10px;padding:4px 10px;border-radius:20px;font-weight:600;}
.pill-transport{background:var(--teal-pale);color:var(--teal);}
.pill-activity{background:var(--gold-pale);color:#7a5c0a;}
.pill-meal{background:var(--coral-pale);color:var(--coral);}
.pill-show{background:var(--purple-pale);color:var(--purple);}
.pill-hotel{background:var(--green-pale);color:var(--green);}
.pill-more{font-size:10px;color:#AAA;padding:4px 8px;}
.today-badge{background:var(--gold);color:var(--dark);font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:6px;}
/* SECTION TITLE */
.sec-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);padding:16px 16px 8px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:"";flex:1;height:1px;background:rgba(201,168,76,.2);}
/* DAY DETAIL */
.det-head{padding:18px 16px 14px;}
.det-day-row{display:flex;align-items:center;gap:12px;}
.det-badge{width:50px;height:50px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.4);}
.det-badge-j{font-size:8px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:1px;}
.det-badge-n{font-size:20px;font-weight:800;color:#fff;line-height:1;}
.det-date{font-size:18px;font-weight:800;color:#fff;}
.det-loc{font-size:11px;font-weight:600;letter-spacing:1px;margin-top:3px;}
.det-subtitle{font-size:13px;color:rgba(255,255,255,.75);margin-top:2px;}
.det-hotel{font-size:10px;font-weight:700;padding:6px 10px;border-radius:20px;background:rgba(255,255,255,.2);color:#fff;text-align:center;max-width:120px;line-height:1.3;flex-shrink:0;}
/* TIMELINE */
.timeline{padding:14px;display:flex;flex-direction:column;}
.tl-row{display:flex;gap:10px;}
.tl-left{display:flex;flex-direction:column;align-items:center;width:14px;flex-shrink:0;}
.tl-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:15px;}
.tl-line{width:2px;flex:1;min-height:10px;}
.tl-card{flex:1;border-radius:12px;padding:12px 12px 10px;margin-bottom:10px;position:relative;}
.tl-time{font-size:10px;font-weight:700;letter-spacing:.5px;margin-bottom:4px;}
.tl-title{font-size:14px;font-weight:700;color:var(--dark);line-height:1.3;margin-bottom:5px;padding-right:80px;}
.tl-body{font-size:12px;color:var(--grey);line-height:1.5;}
.tl-cost{position:absolute;top:10px;right:10px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;max-width:90px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-transport .tl-card{background:var(--teal-pale);}
.t-transport .tl-dot{background:var(--teal);}
.t-transport .tl-line{background:rgba(42,107,124,.2);}
.t-transport .tl-time{color:var(--teal);}
.t-transport .tl-cost{background:var(--teal);color:#fff;}
.t-activity .tl-card{background:var(--gold-pale);}
.t-activity .tl-dot{background:var(--gold);}
.t-activity .tl-line{background:rgba(201,168,76,.2);}
.t-activity .tl-time{color:#7a5c0a;}
.t-activity .tl-cost{background:var(--gold);color:var(--dark);}
.t-meal .tl-card{background:var(--coral-pale);}
.t-meal .tl-dot{background:var(--coral);}
.t-meal .tl-line{background:rgba(200,87,63,.2);}
.t-meal .tl-time{color:var(--coral);}
.t-meal .tl-cost{background:var(--coral);color:#fff;}
.t-hotel .tl-card{background:var(--green-pale);}
.t-hotel .tl-dot{background:var(--green);}
.t-hotel .tl-line{background:rgba(46,107,62,.2);}
.t-hotel .tl-time{color:var(--green);}
.t-hotel .tl-cost{background:var(--green);color:#fff;}
.t-show .tl-card{background:var(--purple-pale);}
.t-show .tl-dot{background:var(--purple);}
.t-show .tl-line{background:rgba(91,58,126,.2);}
.t-show .tl-time{color:var(--purple);}
.t-show .tl-cost{background:var(--purple);color:#fff;}
.tip-box{background:var(--gold-pale);border-left:3px solid var(--gold);border-radius:10px;padding:12px 14px;margin:4px 0 10px;}
.tip-lbl{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:4px;}
.tip-txt{font-size:12px;color:var(--dark2);line-height:1.5;}
.note-bar{background:var(--dark);border-radius:10px;padding:12px 14px;margin-bottom:20px;}
.note-lbl{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:3px;}
.note-txt{font-size:12px;color:#ccc;line-height:1.4;}
/* INFO */
.info-wrap{padding:14px;}
.vol-card{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:10px;border-left:4px solid var(--gold);}
.vol-inner{padding:13px 14px;}
.vol-type{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:4px;}
.vol-route{font-size:15px;font-weight:700;color:var(--dark);margin-bottom:3px;}
.vol-detail{font-size:11px;color:var(--grey);}
.vol-ok{font-size:10px;font-weight:700;color:var(--green);margin-top:4px;}
.hotel-list{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:12px;}
.hotel-row{padding:11px 14px;border-bottom:1px solid #f0ead4;display:flex;gap:10px;align-items:flex-start;}
.hotel-row:last-child{border-bottom:none;}
.hotel-name{font-size:13px;font-weight:700;color:var(--dark);}
.hotel-stars{font-size:10px;color:var(--gold);font-weight:600;margin-top:1px;}
.hotel-addr{font-size:11px;color:var(--grey);margin-top:1px;}
.hotel-ref{font-size:10px;font-weight:700;color:var(--purple);white-space:nowrap;}
.resa-card{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:10px;border:1px solid rgba(201,168,76,.2);}
.resa-head{padding:12px 14px 8px;display:flex;gap:10px;align-items:flex-start;}
.resa-date{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0;color:#fff;}
.resa-name{font-size:14px;font-weight:700;color:var(--dark);line-height:1.3;}
.resa-detail{font-size:11px;color:var(--grey);margin-top:2px;line-height:1.4;}
.resa-foot{padding:8px 14px 10px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.transport-list{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:20px;}
.tr-row{padding:11px 14px;border-bottom:1px solid #f4f4f4;display:flex;justify-content:space-between;gap:10px;align-items:flex-start;}
.tr-row:last-child{border-bottom:none;}
.tr-label{font-size:12px;font-weight:700;color:var(--dark);}
.tr-val{font-size:11px;color:var(--grey);text-align:right;line-height:1.4;max-width:55%;}
/* TIPS */
.tips-wrap{padding:14px;}
.meteo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px;}
.meteo-card{background:#fff;border-radius:12px;padding:12px 8px;text-align:center;}
.meteo-circle{width:52px;height:52px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;}
.meteo-temp{font-size:14px;font-weight:800;color:#fff;}
.meteo-city{font-size:10px;font-weight:700;color:var(--dark);margin-bottom:3px;}
.meteo-hum{font-size:9px;color:var(--grey);line-height:1.4;}
.phrases-list{display:flex;flex-direction:column;gap:6px;margin-bottom:4px;}
.phrase-row{background:#fff;border-radius:10px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.phrase-jp{font-size:13px;font-weight:700;color:var(--dark);}
.phrase-fr{font-size:11px;color:var(--grey);font-style:italic;text-align:right;}
.ess-list{display:flex;flex-direction:column;gap:6px;margin-bottom:20px;}
.ess-row{background:#fff;border-radius:10px;padding:12px 14px;display:flex;gap:10px;align-items:flex-start;}
.ess-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);flex-shrink:0;margin-top:4px;}
.ess-label{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:2px;}
.ess-val{font-size:11px;color:var(--grey);line-height:1.4;}
::-webkit-scrollbar{width:0;}
</style>
</head>

var CHAPTERS  = D.CHAPTERS;
var DAYS      = D.DAYS;
var VOLS      = D.VOLS;
var RESAS     = D.RESAS;
var PHRASES   = D.PHRASES;
var ESSENTIALS= D.ESSENTIALS;

// ── STATE ─────────────────────────────────────────────
var currentScreen = "itinerary";
var currentDay = null;

// ── HELPERS ───────────────────────────────────────────
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

function getTodayId(){
  var now = new Date();
  var start = new Date(2026,7,13);
  var diff = Math.floor((now-start)/86400000);
  return (diff>=0 && diff<17) ? diff+1 : null;
}

function pillColor(t){
  var m={transport:"pill-transport",activity:"pill-activity",meal:"pill-meal",show:"pill-show",hotel:"pill-hotel"};
  return m[t]||"pill-activity";
}
function pillLabel(t){
  var m={transport:"Transport",activity:"Activite",meal:"Repas",show:"Spectacle",hotel:"Sejour"};
  return m[t]||"Info";
}

// ── INIT ──────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", function(){
  document.getElementById("startBtn").addEventListener("click", startApp);
  document.getElementById("backBtn").addEventListener("click", goBack);
  document.getElementById("nav-itinerary").addEventListener("click", function(){ showScreen("itinerary"); });
  document.getElementById("nav-info").addEventListener("click", function(){ showScreen("info"); });
  document.getElementById("nav-tips").addEventListener("click", function(){ showScreen("tips"); });
  renderDays();
  renderInfo();
  renderTips();
  updateProg();
});

function startApp(){
  var cover = document.getElementById("cover");
  var app   = document.getElementById("app");
  cover.classList.add("gone");
  app.style.display = "flex";
  setTimeout(function(){ cover.style.display = "none"; }, 600);
}

// ── SCREENS ───────────────────────────────────────────
function showScreen(name){
  document.querySelectorAll(".screen").forEach(function(s){ s.classList.remove("active"); });
  document.getElementById("screen-"+name).classList.add("active");
  currentScreen = name;
  document.querySelectorAll(".nav-btn").forEach(function(b){ b.classList.remove("active"); });
  var nb = document.getElementById("nav-"+name);
  if(nb) nb.classList.add("active");
  var back = document.getElementById("backBtn");
  if(name==="day"){ back.classList.add("show"); }
  else { back.classList.remove("show"); }
  var titles={itinerary:"Itineraire",info:"Vols et Reservations",tips:"Conseils"};
  document.getElementById("topTitle").textContent = name==="day" ? (currentDay?currentDay.date:"") : (titles[name]||"");
  document.getElementById("topSub").textContent = name==="day" ? (currentDay?currentDay.location:"") : "SINGAPOUR & JAPON 2026";
  document.getElementById("main").scrollTop = 0;
  updateProg();
}

function goBack(){ showScreen("itinerary"); }

function updateProg(){
  var t = getTodayId();
  var pct = t ? ((t-1)/16*100) : 0;
  document.getElementById("progFill").style.width = pct+"%";
}

// ── RENDER DAYS ───────────────────────────────────────
function renderDays(){
  var html = "";
  var lastChap = null;
  var todayId = getTodayId();
  DAYS.forEach(function(day){
    if(day.chap !== lastChap){
      var ch = CHAPTERS.find(function(c){ return c.id===day.chap; });
      html += "<div class=\"chap-head\">";
      html += "<div class=\"chap-num\" style=\"background:"+ch.color+"\"><span class=\"chap-num-n\">"+ch.num+"</span></div>";
      html += "<div><div class=\"chap-city\">"+esc(ch.city)+"</div>";
      html += "<div class=\"chap-dates\" style=\"color:"+ch.color+"\">"+esc(ch.dates)+"</div></div></div>";
      lastChap = day.chap;
    }
    var ch = CHAPTERS.find(function(c){ return c.id===day.chap; });
    var isToday = (day.id===todayId);
    var types = [];
    day.events.slice(0,4).forEach(function(e){ if(types.indexOf(e.type)<0) types.push(e.type); });
    var pillsHtml = types.map(function(t){
      return "<span class=\"pill "+pillColor(t)+"\">"+pillLabel(t)+"</span>";
    }).join("");
    var more = day.events.length-4;
    html += "<div class=\"day-card\" data-id=\""+day.id+"\"><div class=\"day-card-top\">";
    html += "<div class=\"day-badge\" style=\"background:"+ch.color+"\"><span class=\"day-badge-j\">JOUR</span><span class=\"day-badge-n\">"+day.dayNum+"</span></div>";
    html += "<div class=\"day-info\"><div class=\"day-date\">"+esc(day.date)+(isToday?"<span class=\"today-badge\">AUJOURD HUI</span>":"")+"</div>";
    html += "<div class=\"day-loc\">"+esc(day.location)+"</div></div>";
    html += "<div class=\"day-hotel-pill\" style=\"background:"+ch.color+";color:#fff\">"+esc(day.hotel.replace(" *****",""))+"</div>";
    html += "</div><div class=\"day-pills\">"+pillsHtml+(more>0?"<span class=\"pill-more\">+"+more+"</span>":"")+"</div></div>";
  });
  document.getElementById("daysList").innerHTML = html;
  document.querySelectorAll(".day-card").forEach(function(card){
    card.addEventListener("click", function(){
      openDay(parseInt(this.dataset.id));
    });
  });
}

// ── OPEN DAY ──────────────────────────────────────────
function openDay(id){
  currentDay = DAYS.find(function(d){ return d.id===id; });
  if(!currentDay) return;
  var ch = CHAPTERS.find(function(c){ return c.id===currentDay.chap; });
  var parts = currentDay.label.split(" - ");
  var dateStr = parts[0]||"";
  var subStr  = parts.slice(1).join(" - ")||"";
  var evHtml = "";
  currentDay.events.forEach(function(ev, i){
    var isLast = (i===currentDay.events.length-1);
    var costHtml = (ev.cost&&ev.cost!=="---")
      ? "<div class=\"tl-cost\">"+esc(ev.cost)+"</div>" : "";
    evHtml += "<div class=\"tl-row t-"+ev.type+"\">";
    evHtml += "<div class=\"tl-left\"><div class=\"tl-dot\"></div>"+(isLast?"":"<div class=\"tl-line\"></div>")+"</div>";
    evHtml += "<div class=\"tl-card\">"+costHtml;
    evHtml += "<div class=\"tl-time\">"+esc(ev.time)+"</div>";
    evHtml += "<div class=\"tl-title\">"+esc(ev.title)+"</div>";
    evHtml += "<div class=\"tl-body\">"+esc(ev.body)+"</div>";
    evHtml += "</div></div>";
  });
  var tipHtml = currentDay.tip
    ? "<div class=\"tip-box\"><div class=\"tip-lbl\">BON A SAVOIR</div><div class=\"tip-txt\">"+esc(currentDay.tip)+"</div></div>" : "";
  var noteHtml = currentDay.note
    ? "<div class=\"note-bar\"><div class=\"note-lbl\">DEMAIN</div><div class=\"note-txt\">"+esc(currentDay.note)+"</div></div>" : "";
  document.getElementById("dayDetail").innerHTML =
    "<div class=\"det-head\" style=\"background:"+ch.color+"\">"+
    "<div class=\"det-day-row\">"+
    "<div class=\"det-badge\"><span class=\"det-badge-j\">JOUR</span><span class=\"det-badge-n\">"+currentDay.dayNum+"</span></div>"+
    "<div style=\"flex:1;min-width:0;\"><div class=\"det-date\">"+esc(dateStr)+"</div>"+
    "<div class=\"det-subtitle\">"+esc(subStr)+"</div>"+
    "<div class=\"det-loc\" style=\"color:rgba(255,255,255,.8)\">"+esc(currentDay.location)+"</div></div>"+
    "<div class=\"det-hotel\">"+esc(currentDay.hotel)+"</div>"+
    "</div></div>"+
    "<div class=\"timeline\">"+evHtml+tipHtml+noteHtml+"</div>";
  showScreen("day");
}
